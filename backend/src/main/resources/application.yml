spring:
  config:
    import: optional:file:.env[.properties]
  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER}
    password: ${SMTP_PASS}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: ${SMTP_SSL_ENABLE:false}
          starttls:
            enable: ${SMTP_STARTTLS_ENABLE:true}

server:
  port: ${PORT:4000}

app:
  frontend-origin: ${FRONTEND_ORIGIN:http://localhost:5173}
  mail:
    from: ${MAIL_FROM}
    to: ${MAIL_TO}

management:
  endpoints:
    web:
      exposure:
        include: health

upstream expophoenix_api {
    server api:4000;
}

server {
    listen 80;
    server_name expophoenix.com www.expophoenix.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name expophoenix.com www.expophoenix.com;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text resources to speed up first paint.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Never cache HTML entrypoint so clients always see fresh asset hashes.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        expires -1;
    }

    # Long-cache versioned static files produced by Vite.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://expophoenix_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Avoid 504 if upstream is slow (SMTP etc.); async mail keeps responses fast anyway.
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Keep public runtime assets reasonably cached.
    location ~* \.(?:png|jpg|jpeg|gif|webp|svg|ico|mp4|woff|woff2|ttf|otf|json)$ {
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
